<!DOCTYPE html>
<html>

<head>
    <title>BookMyShow Payment Test</title>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:10px;
            width:400px;
            text-align:center;
            box-shadow:0px 5px 20px rgba(0,0,0,0.1);
        }

        button{
            background:#3399cc;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#287ca6;
        }

    </style>

</head>

<body>

<div class="card">

    <h2>BookMyShow Payment Test</h2>

    <button onclick="payNow()">Pay Now</button>

</div>

<script>

    async function payNow(){

        const bookingReference = "BMS-20260306-PBNZP";

        console.log("Starting payment for booking:", bookingReference);

        try {

            console.log("Calling backend to create Razorpay order...");

            const response = await fetch(
                "http://localhost:8081/payments/create-order/" + bookingReference,
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1c2VyMDNAdGVzdC5jb20iLCJyb2xlcyI6WyJST0xFX1VTRVIiXSwiaWF0IjoxNzcyNzYxOTU3LCJleHAiOjE3NzI3NjU1NTd9.F4RW7j4k1ctF63rDWjQlrToUpNwfdaUrTg74kG0yNOQ"
                    }
                }
            );

            const data = await response.json();

            console.log("Backend response:", data);

            const orderId = data.data.orderId;
            const amount = data.data.amount;

            console.log("Razorpay Order ID:", orderId);
            console.log("Amount (paise):", amount);

            var options = {

                key: "rzp_test_S3ak9JzUH1tiWF",

                amount: amount,

                currency: "INR",

                name: "BookMyShow",

                description: "Movie Ticket",

                order_id: orderId,

                handler: function (response){

                    console.log("Payment Success Response:", response);

                    console.log("Razorpay Payment ID:", response.razorpay_payment_id);
                    console.log("Razorpay Order ID:", response.razorpay_order_id);
                    console.log("Razorpay Signature:", response.razorpay_signature);

                    alert("Payment Successful!");

                },

                modal: {
                    ondismiss: function(){
                        console.log("Payment popup closed by user.");
                    }
                }

            };

            console.log("Opening Razorpay checkout...");

            var rzp = new Razorpay(options);

            rzp.open();

        } catch(error){

            console.error("Payment Error:", error);

            alert("Payment initialization failed. Check console.");

        }

    }

</script>

</body>
</html>
