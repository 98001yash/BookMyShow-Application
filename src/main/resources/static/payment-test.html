<!DOCTYPE html>
<html>

<head>
    <title>BookMyShow Payment Test</title>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:10px;
            width:400px;
            text-align:center;
            box-shadow:0px 5px 20px rgba(0,0,0,0.1);
        }

        button{
            background:#3399cc;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#287ca6;
        }
    </style>

</head>

<body>

<div class="card">

    <h2>BookMyShow Payment Test</h2>

    <button onclick="payNow()">Pay Now</button>

</div>

<script>

    async function payNow(){

        const bookingReference = "BMS-20260307-W24IH";

        console.log("Starting payment for booking:", bookingReference);

        try {

            console.log("Calling backend to create Razorpay order...");

            const response = await fetch(
                "http://localhost:8081/payments/create-order/" + bookingReference,
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhbmtpdGtyMzAxMjAwNUBnbWFpbC5jb20iLCJyb2xlcyI6WyJST0xFX1VTRVIiXSwiaWF0IjoxNzcyODcwODQzLCJleHAiOjE3NzI4NzQ0NDN9.OJc_2BNQKJXTV18c3pAh5MxaDKNEav0-6rFk9CbwEJg"
                    }
                }
            );

            const data = await response.json();

            console.log("Backend response:", data);

            const orderId = data.data.orderId;
            const amount = data.data.amount;

            console.log("Razorpay Order ID:", orderId);
            console.log("Amount (paise):", amount);

            var options = {

                key: "rzp_test_S3ak9JzUH1tiWF",

                amount: amount,

                currency: "INR",

                name: "BookMyShow",

                description: "Movie Ticket",

                order_id: orderId,

                handler: async function (response){

                    console.log("Payment Success Response:", response);

                    console.log("Payment ID:", response.razorpay_payment_id);
                    console.log("Order ID:", response.razorpay_order_id);
                    console.log("Signature:", response.razorpay_signature);

                    // 🔵 CALL BACKEND TO VERIFY PAYMENT

                    const verifyResponse = await fetch(
                        "http://localhost:8081/payments/verify",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({

                                bookingReference: bookingReference,

                                paymentId: response.razorpay_payment_id,

                                orderId: response.razorpay_order_id,

                                signature: response.razorpay_signature

                            })
                        }
                    );

                    const verifyResult = await verifyResponse.text();

                    console.log("Verification result:", verifyResult);

                    alert("Payment Verified & Booking Confirmed!");

                },

                modal: {
                    ondismiss: function(){
                        console.log("Payment popup closed by user.");
                    }
                }

            };

            console.log("Opening Razorpay checkout...");

            var rzp = new Razorpay(options);

            rzp.open();

        } catch(error){

            console.error("Payment Error:", error);

            alert("Payment initialization failed. Check console.");

        }

    }

</script>

</body>
</html>
